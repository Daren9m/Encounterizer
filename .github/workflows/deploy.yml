name: Deploy

# Deploys the static export to Azure Static Web Apps on every push to the
# default branch. We build in this workflow (skip_app_build) so the deploy
# uses the exact same Node version and lockfile as CI, instead of letting
# SWA's Oryx builder auto-detect Next.js and try a hybrid build.
#
# One-time setup (see README "Deployment"):
#   1. Azure Portal → Create Static Web App → plan Free → source "Other"
#   2. Repo Settings → Actions → secret AZURE_STATIC_WEB_APPS_API_TOKEN
#      (from the SWA "Manage deployment token" page)
#   3. Repo Settings → Actions → variable SITE_URL (the SWA URL)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: out
          skip_app_build: true

  preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: swa-preview-${{ github.event.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static preview
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL }}

      - name: Deploy pull request preview
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: out
          skip_app_build: true
          deployment_environment: pr-${{ github.event.number }}

      - name: Post preview link
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- encounterizer-swa-preview -->';
            const body = `${marker}\n## Azure preview ready\n\n${{ steps.swa.outputs.static_web_app_url }}\n\nUpdated for commit \`${context.sha.slice(0, 7)}\`.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const previous = comments.find(comment => comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  close-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close pull request preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
          deployment_environment: pr-${{ github.event.number }}
